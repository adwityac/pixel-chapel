<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pixel Chapel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root{
  --navy:#20294a;
  --navy-deep:#12182c;
  --gold:#d9a94e;
  --gold-bright:#f5cf6f;
  --glass-teal:#2ab7c9;
  --glass-rose:#c9557a;
  --glass-gold:#e0b657;
  --wood:#3d2718;
  --wood-dark:#241609;
  --ivory:#efe4c8;
}

*{box-sizing:border-box; image-rendering:pixelated; image-rendering:crisp-edges;}
html,body{margin:0;padding:0;height:100%;background:#12182c;overflow:hidden;font-family:'Press Start 2P',monospace;color:var(--ivory);}
body{min-height:100svh;}
canvas{image-rendering:pixelated;}
button{font-family:'Press Start 2P',monospace;}

/* ---------- ENTRY SCREEN ---------- */
#entry{
  position:fixed;inset:0;background:#000;color:var(--gold);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;z-index:1000;text-align:center;
}
#entry .title{font-size:22px;line-height:2.4;text-shadow:0 0 8px var(--gold);}
#entry .sub{font-size:11px;margin-top:30px;color:var(--glass-teal);animation:blink 1.2s steps(2) infinite;}
#entry::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.35) 0px,rgba(0,0,0,0.35) 1px,transparent 2px,transparent 3px);
}
@keyframes blink{50%{opacity:0;}}

/* ---------- CHAPEL ROOT ---------- */
#chapel{position:fixed;inset:0;background:var(--navy-deep);overflow:hidden;min-height:100svh;}
#chapel.hidden{display:none;}

.scene{
  position:absolute;inset:0;
  background:
    linear-gradient(var(--navy) 0%, var(--navy-deep) 100%);
  overflow:hidden;
}

/* stone wall texture */
.wall{
  position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg, #2a345d 0 38px, #20294c 38px 40px),
    repeating-linear-gradient(90deg, rgba(0,0,0,0.09) 0 60px, transparent 60px 120px);
  opacity:0.96;
}
.wall::before{
  content:"";position:absolute;inset:0;
  background-image:repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 2px, transparent 2px 60px);
}

/* floor */
.floor{
  position:absolute;left:0;right:0;bottom:0;height:38%;
  background:linear-gradient(#362214, #1f1209);
  background-image:repeating-linear-gradient(100deg, rgba(0,0,0,0.16) 0 3px, transparent 3px 40px);
}

/* day/night overlay */
.night-overlay{
  position:absolute;inset:0;background:rgba(20,30,90,0.26);mix-blend-mode:multiply;
  opacity:0;transition:opacity 1.2s;pointer-events:none;z-index:40;
}
.night-overlay.on{opacity:1;}

/* CRT + vignette overlays */
.crt-overlay{
  position:absolute;inset:0;pointer-events:none;z-index:90;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0.16) 0px, rgba(0,0,0,0.16) 1px, transparent 2px, transparent 4px);
  mix-blend-mode:multiply;
}
.vignette{
  position:absolute;inset:0;pointer-events:none;z-index:91;
  background:radial-gradient(ellipse at center, transparent 52%, rgba(10,5,20,0.26) 80%, rgba(5,2,10,0.5) 100%);
  box-shadow:inset 0 0 90px 24px rgba(80,30,60,0.1);
}
.vhs-glow{
  position:absolute;inset:0;pointer-events:none;z-index:89;
  background:radial-gradient(ellipse at center, rgba(255,225,190,0.12), transparent 62%);
  filter:blur(2px);
}

/* windows */
.window{position:absolute;top:6%;width:15%;max-width:150px;filter:drop-shadow(0 0 14px rgba(80,180,200,0.35));}
.window-left{left:8%;}
.window-right{right:8%;}
.shimmer{animation:shimmer 3.2s ease-in-out infinite;}
@keyframes shimmer{0%,100%{opacity:1;}50%{opacity:0.72;}}

/* pews, forced perspective */
.pews{position:absolute;bottom:0;height:34%;width:34%;}
.pews-left{left:0;}
.pews-right{right:0;transform:scaleX(-1);}
.pew-row{position:absolute;bottom:0;left:0;height:40px;background:linear-gradient(var(--wood), var(--wood-dark));
  border-top:3px solid #5a3a20;box-shadow:0 3px 0 #150c05;}
.pew-row::before{content:"";position:absolute;left:0;right:0;top:-14px;height:14px;background:var(--wood);border-top:3px solid #5a3a20;}

/* altar area */
.altar-wrap{position:absolute;left:50%;bottom:14%;transform:translateX(-50%);width:46%;max-width:520px;text-align:center;z-index:20;}
.altar{
  position:relative;width:100%;height:120px;background:linear-gradient(var(--wood) 0%, var(--wood-dark) 100%);
  border:4px solid #2e1b0b;box-shadow:0 8px 0 #140b05, inset 0 0 0 3px rgba(217,169,78,0.22);
}
.altar-carving{
  position:absolute;inset:8px;background-image:
    repeating-linear-gradient(45deg, rgba(217,169,78,0.18) 0 6px, transparent 6px 20px),
    repeating-linear-gradient(-45deg, rgba(217,169,78,0.15) 0 6px, transparent 6px 20px);
  border:2px solid rgba(217,169,78,0.35);
}
.altar-top{
  position:absolute;left:-6%;right:-6%;top:-14px;height:14px;background:var(--wood);
  border-top:3px solid #5a3a20;box-shadow:0 3px 0 #150c05;
}

.candles-row{position:absolute;top:-54px;left:0;right:0;height:58px;display:flex;align-items:flex-end;justify-content:center;gap:6px;pointer-events:none;z-index:18;}
.candle-slot{width:26px;height:50px;position:relative;}
.candle-slot canvas{position:absolute;bottom:0;left:0;}

.bible-wrap{position:absolute;top:-58px;left:50%;transform:translateX(-50%);width:70px;height:26px;}
.bible-wrap canvas{width:100%;height:100%;}

.jesus-wrap{position:absolute;top:-190px;left:50%;transform:translateX(-50%);width:170px;height:170px;z-index:15;}
.jesus-wrap img{
  width:100%;height:100%;display:block;object-fit:cover;
  image-rendering:pixelated;image-rendering:crisp-edges;
  filter:drop-shadow(0 4px 0 rgba(0,0,0,0.45)) drop-shadow(0 0 12px rgba(245,207,111,0.25));
}
.halo{position:absolute;top:4px;left:50%;width:56px;height:56px;transform:translateX(-50%);z-index:14;
  background:conic-gradient(var(--gold-bright),var(--gold),var(--gold-bright),var(--gold),var(--gold-bright));
  border-radius:50%;filter:blur(0.4px);animation:halorotate 6s linear infinite, haloglow 2.4s ease-in-out infinite;
  clip-path:circle(50% at 50% 50%);
  mask:radial-gradient(circle, black 55%, transparent 62%, black 68%, transparent 76%);
  -webkit-mask:radial-gradient(circle, black 55%, transparent 62%, black 68%, transparent 76%);
}
@keyframes halorotate{to{transform:translateX(-50%) rotate(360deg);}}
@keyframes haloglow{0%,100%{filter:drop-shadow(0 0 4px var(--gold)) blur(0.4px);}50%{filter:drop-shadow(0 0 12px var(--gold-bright)) blur(0.4px);}}

.decor-flower{position:absolute;bottom:-4px;width:20px;height:26px;}
.decor-flower.left{left:-30px;}
.decor-flower.right{right:-30px;}
.decor-cross{
  position:absolute;top:-270px;left:50%;transform:translateX(-50%);
  width:52px;height:132px;z-index:17;
  filter:
    drop-shadow(0 0 0 #080b14)
    drop-shadow(3px 0 0 #080b14)
    drop-shadow(-3px 0 0 #080b14)
    drop-shadow(0 3px 0 #080b14)
    drop-shadow(0 -3px 0 #080b14)
    drop-shadow(0 0 10px rgba(245,207,111,0.55));
}
.decor-icon{position:absolute;bottom:14px;left:14px;width:34px;height:40px;}
.decor-garland{position:absolute;top:-16px;left:-4%;right:-4%;height:16px;}
.stars-wrap{position:absolute;top:-40px;left:-6%;right:-6%;height:24px;pointer-events:none;}
.star{position:absolute;width:12px;height:12px;animation:starshimmer 1.6s ease-in-out infinite;}
@keyframes starshimmer{0%,100%{opacity:0.4;transform:scale(0.85);}50%{opacity:1;transform:scale(1.15);}}

/* holy water font */
.holy-font{position:absolute;left:9%;bottom:25%;width:70px;height:110px;cursor:pointer;z-index:19;}
.holy-font canvas{width:100%;height:100%;}
.holy-font:hover{filter:brightness(1.2);}
.particle{position:absolute;width:4px;height:4px;background:#bfe9ff;box-shadow:0 0 4px #bfe9ff;pointer-events:none;z-index:25;}

/* gold dust */
.dust-layer{position:absolute;inset:0;pointer-events:none;z-index:12;}
.dust{position:absolute;width:2px;height:2px;background:var(--gold-bright);opacity:0.7;animation:dustrise linear infinite;}
@keyframes dustrise{
  0%{transform:translateY(0);opacity:0;}
  10%{opacity:0.8;}
  90%{opacity:0.5;}
  100%{transform:translateY(-100vh);opacity:0;}
}

/* birds */
.bird{position:absolute;width:16px;height:10px;z-index:13;animation:birdfly linear forwards;}
@keyframes birdfly{from{transform:translateX(-40px);}to{transform:translateX(110vw);}}

/* ---------- VERSE BOX ---------- */
.verse-box{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);width:min(560px,86%);
  background:var(--navy-deep);border:3px solid var(--gold);padding:14px 18px;font-size:11px;line-height:1.9;
  z-index:60;cursor:pointer;box-shadow:0 0 0 2px #000, 0 6px 0 rgba(0,0,0,0.5);
}
.verse-box .label{color:var(--glass-teal);font-size:10px;margin-bottom:8px;}
.verse-box .dismiss-hint{position:absolute;bottom:4px;right:8px;font-size:8px;color:var(--gold);opacity:0.7;}

/* ---------- UI PANEL ---------- */
.ui-panel{
  position:absolute;left:0;right:0;bottom:0;z-index:70;
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;
  padding:10px;background:linear-gradient(rgba(11,15,28,0) 0%, rgba(11,15,28,0.92) 30%);
}
.pbtn{
  background:var(--navy);color:var(--gold);border:3px solid var(--gold);padding:0 10px;
  min-height:34px;display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-size:9px;line-height:1;cursor:pointer;box-shadow:0 3px 0 #000;
}
.pbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #000;}
.pbtn.active{background:var(--gold);color:var(--navy-deep);}
.pbtn.small{font-size:14px;padding:6px 10px;}
.count-badge{min-height:34px;display:inline-flex;align-items:center;font-size:9px;line-height:1;color:var(--ivory);}
.youtube-audio{
  position:fixed;left:-2px;bottom:-2px;width:1px;height:1px;
  opacity:0;pointer-events:none;overflow:hidden;
}

/* ---------- JOURNAL ---------- */
.journal-panel{
  position:absolute;right:16px;bottom:74px;width:280px;z-index:80;
  background:var(--navy-deep);border:4px solid var(--gold);padding:14px;
  box-shadow:0 0 0 2px #000, 0 6px 0 rgba(0,0,0,0.5);
}
.journal-panel h3{margin:0 0 8px;font-size:10px;color:var(--glass-teal);}
.journal-panel textarea{
  width:100%;height:60px;background:#0d1120;color:var(--ivory);border:2px solid var(--gold);
  font-family:'Press Start 2P',monospace;font-size:8px;padding:6px;resize:none;
}
.journal-panel .save-btn{margin-top:8px;width:100%;}
.journal-panel .clear-btn{margin-top:6px;width:100%;color:var(--glass-rose);border-color:var(--glass-rose);}
.prayer-item{font-size:8px;border-top:1px dashed rgba(217,169,78,0.4);padding:6px 0;line-height:1.6;color:#cfd7ea;}
.journal-note{font-size:7px;color:#8b93ab;margin-top:6px;line-height:1.6;}
.confession-message{display:none;margin-top:8px;font-size:8px;line-height:1.7;color:var(--gold-bright);}

/* ---------- POLAROID ---------- */
.polaroid-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center;}
.polaroid{
  background:var(--ivory);padding:14px 14px 40px;transform:rotate(-4deg);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}
.polaroid img{display:block;width:340px;image-rendering:pixelated;border:1px solid #888;}
.polaroid .stamp{margin-top:10px;font-size:9px;color:#333;text-align:center;}
.polaroid-actions{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;gap:10px;}

@media (max-width: 760px){
  #entry .title{font-size:18px;line-height:2;}
  #entry .sub{font-size:9px;margin-top:22px;}

  .window{top:8%;width:20%;max-width:96px;}
  .window-left{left:4%;}
  .window-right{right:4%;}

  .pews{height:28%;width:43%;}
  .altar-wrap{bottom:17%;width:min(82vw, 380px);}
  .altar{height:104px;}
  .jesus-wrap{top:-170px;width:148px;height:148px;}
  .candles-row{top:-50px;gap:3px;}
  .candle-slot{width:22px;}
  .bible-wrap{top:-52px;width:58px;height:22px;}
  .decor-cross{top:-260px;width:42px;height:108px;}
  .decor-icon{left:8px;bottom:10px;width:28px;height:34px;}
  .decor-flower.left{left:-20px;}
  .decor-flower.right{right:-20px;}
  .holy-font{left:4%;bottom:15%;width:56px;height:82px;z-index:22;}

  .verse-box{
    top:10px;width:calc(100vw - 24px);padding:10px 12px;
    font-size:8px;line-height:1.8;max-height:30vh;overflow:auto;
  }
  .verse-box .label{font-size:8px;margin-bottom:6px;}
  .verse-box .dismiss-hint{font-size:6px;}

  .ui-panel{
    flex-wrap:nowrap;justify-content:flex-start;gap:6px;
    overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
    padding:10px 12px 24px;
    padding:10px 12px calc(14px + max(env(safe-area-inset-bottom), 10px));
    scroll-padding:0 12px;
  }
  .crt-overlay{
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 2px, transparent 4px);
  }
  .vignette{
    background:radial-gradient(ellipse at center, transparent 58%, rgba(10,5,20,0.18) 82%, rgba(5,2,10,0.36) 100%);
    box-shadow:inset 0 0 64px 16px rgba(80,30,60,0.08);
  }
  .ui-panel::-webkit-scrollbar{display:none;}
  .pbtn{flex:0 0 auto;min-height:38px;padding:0 9px;font-size:7px;white-space:nowrap;}
  .count-badge{flex:0 0 auto;min-height:38px;font-size:7px;white-space:nowrap;padding:0 2px;}

  .journal-panel{
    left:10px;right:10px;bottom:64px;width:auto;max-height:48vh;
    overflow:auto;padding:10px;
  }
  .journal-panel h3{font-size:9px;}
  .journal-panel textarea{height:70px;font-size:7px;}
  .prayer-item{font-size:7px;}

  .polaroid{padding:10px 10px 34px;transform:rotate(-2deg);}
  .polaroid img{width:min(340px, calc(100vw - 56px));}
  .polaroid-actions{bottom:24px;gap:8px;}
}

@media (max-width: 420px){
  .altar-wrap{bottom:19%;width:88vw;}
  .altar{height:96px;}
  .jesus-wrap{top:-156px;width:132px;height:132px;}
  .candles-row{top:-46px;transform:scale(0.9);transform-origin:center bottom;}
  .bible-wrap{top:-48px;}
  .decor-cross{top:-236px;width:36px;height:92px;}
  .decor-garland{left:-2%;right:-2%;}
  .stars-wrap{top:-34px;}
  .holy-font{left:3%;width:50px;height:70px;}
  .verse-box{font-size:7px;line-height:1.7;}
}

@media (max-height: 560px){
  .window{top:3%;width:13%;}
  .altar-wrap{bottom:16%;transform:translateX(-50%) scale(0.82);transform-origin:center bottom;}
  .holy-font{bottom:16%;transform:scale(0.8);transform-origin:left bottom;}
  .verse-box{max-height:22vh;}
  .journal-panel{max-height:42vh;}
}
</style>
</head>
<body>

<div id="entry">
  <div class="title">PIXEL CHAPEL</div>
  <div class="sub">CLICK TO ENTER</div>
</div>

<div id="chapel" class="hidden">
  <div class="scene" id="scene">
    <div class="wall"></div>
    <div class="floor"></div>

    <div class="window window-left shimmer" id="winLeft"></div>
    <div class="window window-right shimmer" id="winRight"></div>

    <div class="pews pews-left" id="pewsLeft"></div>
    <div class="pews pews-right" id="pewsRight"></div>

    <div class="holy-font" id="holyFont"><canvas id="fontCanvas" width="35" height="55"></canvas></div>

    <div class="altar-wrap">
      <div class="altar">
        <div class="altar-top"></div>
        <div class="altar-carving"></div>

        <div class="jesus-wrap">
          <img id="jesusImage" src="jesus-icon.jpg" alt="">
        </div>

        <div class="candles-row" id="candlesRow"></div>
        <div class="bible-wrap"><canvas id="bibleCanvas" width="70" height="26"></canvas></div>

        <div id="decorCross" class="decor-cross" style="display:none;"><canvas width="20" height="55"></canvas></div>
        <div id="decorIcon" class="decor-icon" style="display:none;"><canvas width="17" height="20"></canvas></div>
        <div id="decorGarland" class="decor-garland" style="display:none;"><canvas width="200" height="16"></canvas></div>
        <div id="decorFlowerL" class="decor-flower left" style="display:none;"><canvas width="10" height="13"></canvas></div>
        <div id="decorFlowerR" class="decor-flower right" style="display:none;"><canvas width="10" height="13"></canvas></div>
        <div id="starsWrap" class="stars-wrap" style="display:none;"></div>
      </div>
    </div>

    <div class="dust-layer" id="dustLayer"></div>
    <div class="night-overlay" id="nightOverlay"></div>
  </div>

  <div class="crt-overlay"></div>
  <div class="vhs-glow"></div>
  <div class="vignette"></div>

  <div class="verse-box" id="verseBox">
    <div class="label">✝ VERSE OF THE DAY</div>
    <div id="verseText"></div>
    <div class="dismiss-hint">CLICK TO DISMISS</div>
  </div>

  <div class="journal-panel" id="journalPanel" style="display:none;">
    <h3>PRAYER JOURNAL</h3>
    <textarea id="journalInput" placeholder="Write a prayer..."></textarea>
    <button class="pbtn save-btn" id="journalSave">SAVE</button>
    <button class="pbtn clear-btn" id="journalClear">CLEAR ALL</button>
    <div id="prayerList"></div>
  </div>

  <div class="journal-panel" id="confessionPanel" style="display:none;">
    <h3>CONFESSION OF SIN</h3>
    <textarea id="confessionInput" placeholder="Confess your sin..."></textarea>
    <button class="pbtn save-btn" id="confessionSubmit">SUBMIT</button>
    <div class="confession-message" id="confessionMessage">Jesus will forgive your sins</div>
  </div>

  <div class="ui-panel">
    <button class="pbtn" id="lightBtn">LIGHT</button>
    <button class="pbtn" id="snuffBtn">SNUFF</button>
    <span class="count-badge" id="candleCount">0 / 8</span>
    <button class="pbtn" id="toggleFlowers">FLOWERS</button>
    <button class="pbtn" id="toggleCross">CROSS</button>
    <button class="pbtn" id="toggleIcon">ICON</button>
    <button class="pbtn" id="toggleGarland">GARLAND</button>
    <button class="pbtn" id="toggleNight">NIGHT</button>
    <button class="pbtn" id="toggleJournal">JOURNAL</button>
    <button class="pbtn" id="toggleConfession">CONFESSION</button>
    <button class="pbtn" id="audioModeBtn">AUDIO: CHAPEL</button>
    <button class="pbtn" id="snapBtn">SNAP</button>
  </div>
  <div class="youtube-audio" id="youtubeAudio" aria-hidden="true"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
/* =========================================================
   PIXEL ART DRAW HELPERS
   ========================================================= */
function drawGrid(ctx, grid, palette, px){
  ctx.imageSmoothingEnabled = false;
  for(let y=0;y<grid.length;y++){
    const row = grid[y];
    for(let x=0;x<row.length;x++){
      const c = row[x];
      if(c==='.') continue;
      ctx.fillStyle = palette[c];
      ctx.fillRect(x*px, y*px, px, px);
    }
  }
}

];

/* ---- Flower 5x6 (rose + purple variants share shape) ---- */
function flowerGrid(petal){
  return [
   ".p.p.",
   "ppppp",
   ".pcp.",
   "..s..",

   ".ss..",
  ];
}
const flowerPaletteRose = {p:'#c9557a', c:'#f5cf6f', s:'#2f7a3d'};
const flowerPalettePurple = {p:'#8f5fc9', c:'#f5cf6f', s:'#2f7a3d'};

/* ---- Icon portrait (gold frame + saint bust) 17x20 ---- */
const iconPalette = {g:'#e0b657', b:'#241609', f:'#f0c48a', r:'#f5f0e6', h:'#c9a04e'};
const iconGrid = [

function burstHolyWater(originEl){
  const rect = originEl.getBoundingClientRect();
  for(let i=0;i<16;i++){
    const p = document.createElement('div');
    p.className='particle';
    const startX = rect.left + rect.width/2 + (Math.random()*20-10);
    const startY = rect.top + rect.height*0.25;
    p.style.left = startX+'px';
    p.style.top = startY+'px';
    document.getElementById('chapel').appendChild(p);
    const dx = (Math.random()*60-30);
    const dur = 700 + Math.random()*500;
    let frame=0;
    const totalFrames = 8;
    const iv = setInterval(()=>{
      frame++;
      p.style.transform = `translate(${dx*(frame/totalFrames)}px, ${-60*(frame/totalFrames)}px)`;
      p.style.opacity = 1 - frame/totalFrames;
      if(frame>=totalFrames){ clearInterval(iv); p.remove(); }
    }, dur/totalFrames);
  }
}

   ========================================================= */
const MAX_CANDLES = 8;
let candleCount = 0;
const candleOrder = [3,4,2,5,1,6,0,7]; // fill alternately outward from center
const candleSlots = [];

function buildCandleSlots(){
  const row = document.getElementById('candlesRow');
  row.innerHTML='';
  for(let i=0;i<MAX_CANDLES;i++){
    const slot = document.createElement('div');
    slot.className='candle-slot';
    const canvas = document.createElement('canvas');
    canvas.width=26; canvas.height=50;
    slot.appendChild(canvas);
    row.appendChild(slot);
    candleSlots.push({el:slot, canvas, lit:false, frame:0});
  }
}
buildCandleSlots();

const candlePalette = {i:'#efe4c8', I:'#d8c8a0', w:'#3d2718', g:'#e0b657', G:'#8a6420'};
function candleBaseGrid(){
  return [
   "..w....",
   ".iii...",
   ".iii...",
   "iiiii..",
   "iiiiI..",
   "iiiii..",
   "iiiiI..",
   "iiiii..",
   "gggggg.",
   "GgggggG",
   "gggggg.",
  ];
}

function drawCandle(slot){
  const ctx = slot.canvas.getContext('2d');
  const px=3;
  const baseY = 15;
  const flameY = 3;
  ctx.clearRect(0,0,slot.canvas.width, slot.canvas.height);
  const base = candleBaseGrid();
  for(let y=0;y<base.length;y++){
    for(let x=0;x<base[y].length;x++){
      const ch = base[y][x];
      if(ch==='.') continue;
      ctx.fillStyle = candlePalette[ch];
      ctx.fillRect(x*px, baseY + y*px, px, px);
    }
  }
  if(slot.lit){
    const flame = flameFrames[slot.frame % flameFrames.length];
    // draw flame above candle top
    for(let y=0;y<flame.length;y++){
      for(let x=0;x<flame[y].length;x++){
        const ch = flame[y][x];
        if(ch==='.') continue;
        ctx.fillStyle = flamePalette[ch];
        ctx.fillRect((x+1)*px, flameY + y*px, px, px);
      }
    }
  }
}
candleSlots.forEach(drawCandle);

setInterval(()=>{
  candleSlots.forEach(slot=>{
    if(slot.lit){
      slot.frame = (slot.frame+1)%flameFrames.length;
      drawCandle(slot);
    }
  });
}, 220);

function updateCandleUI(){
  document.getElementById('candleCount').textContent = candleCount+' / '+MAX_CANDLES;
}

document.getElementById('lightBtn').addEventListener('click', ()=>{
  if(candleCount>=MAX_CANDLES) return;
  const idx = candleOrder[candleCount];
  candleSlots[idx].lit = true;
  drawCandle(candleSlots[idx]);
  candleCount++;
  updateCandleUI();
  playCandleSweep();
});
document.getElementById('snuffBtn').addEventListener('click', ()=>{
  if(candleCount<=0) return;
  candleCount--;
  const idx = candleOrder[candleCount];
  candleSlots[idx].lit = false;
  drawCandle(candleSlots[idx]);
  updateCandleUI();
  playCandleSweep(true);
});
updateCandleUI();

/* =========================================================
   AUDIO (Web Audio API synthesis)
   ========================================================= */
let audioCtx;
let choirNodes = [];
let bellTimer;
let soundMode = 'chapel';
let youtubeFrame;
const YOUTUBE_VIDEO_ID = '4wZmRQcIDME';

function initAudio(){
  ensureAudioContext();
  setAudioMode('chapel');
}

function ensureAudioContext(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

function setAudioMode(mode){
  soundMode = mode;
  if(mode === 'chapel'){
    stopYouTubeAudio();
    ensureAudioContext();
    startChoirDrone();
    ringBell();
    scheduleBell();
  }else if(mode === 'track'){
    stopChapelAudio();
    startYouTubeAudio();
  }else{
    stopChapelAudio();
    stopYouTubeAudio();
  }
  updateAudioModeUI();
}

function updateAudioModeUI(){
  const btn = document.getElementById('audioModeBtn');
  if(!btn) return;
  const labels = {
    chapel: 'AUDIO: CHAPEL',
    track: 'AUDIO: TRACK',
    muted: 'AUDIO: OFF'
  };
  btn.textContent = labels[soundMode];
  btn.classList.toggle('active', soundMode !== 'chapel');
}

function cycleAudioMode(){
  const next = soundMode === 'chapel' ? 'track' : soundMode === 'track' ? 'muted' : 'chapel';
  setAudioMode(next);
}

function stopChapelAudio(){
  if(bellTimer){
    clearTimeout(bellTimer);
    bellTimer = null;
  }
  choirNodes.forEach(node=>{
    try{ node.stop(); }catch(e){}
    try{ node.disconnect(); }catch(e){}
  });
  choirNodes = [];
}

function ensureYouTubeAudio(){
  if(youtubeFrame) return;
  const holder = document.getElementById('youtubeAudio');
  youtubeFrame = document.createElement('iframe');
  youtubeFrame.width = '1';
  youtubeFrame.height = '1';
  youtubeFrame.title = 'Pixel Chapel background track';
  youtubeFrame.allow = 'autoplay; encrypted-media';
  youtubeFrame.src = `https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?enablejsapi=1&playsinline=1&loop=1&playlist=${YOUTUBE_VIDEO_ID}&controls=0&disablekb=1&modestbranding=1`;
  youtubeFrame.addEventListener('load', ()=>{
    if(soundMode === 'track') sendYouTubeCommand('playVideo');
  });
  holder.appendChild(youtubeFrame);
}

function sendYouTubeCommand(func){
  if(!youtubeFrame || !youtubeFrame.contentWindow) return;
  youtubeFrame.contentWindow.postMessage(JSON.stringify({
    event: 'command',
    func,
    args: []
  }), '*');
}

function startYouTubeAudio(){
  ensureYouTubeAudio();
  setTimeout(()=>{
    if(soundMode === 'track') sendYouTubeCommand('playVideo');
  }, 700);
}

function stopYouTubeAudio(){
  sendYouTubeCommand('pauseVideo');
}

function startChoirDrone(){
  if(soundMode !== 'chapel' || choirNodes.length) return;
  const freqs = [130.81, 164.81, 196.00, 261.63]; // C3 E3 G3 C4
  const master = audioCtx.createGain();
  master.gain.value = 0.035;
  master.connect(audioCtx.destination);
  freqs.forEach((f, i)=>{
    const osc = audioCtx.createOscillator();
    osc.type='sine';
    osc.frequency.value = f;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.8;
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.12 + i*0.03;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 3;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    osc.connect(gain);
    gain.connect(master);
    osc.start();
    lfo.start();
    choirNodes.push(osc, lfo);
  });
}

function ringBell(){
  if(soundMode !== 'chapel' || !audioCtx) return;
  const now = audioCtx.currentTime;
  const partials = [1, 2.01, 3.0, 4.2];
  const baseFreq = 220;
  const master = audioCtx.createGain();
  master.gain.value = 0.0001;
  master.connect(audioCtx.destination);
  master.gain.linearRampToValueAtTime(0.18, now+0.02);
  master.gain.exponentialRampToValueAtTime(0.0001, now+3.2);
  partials.forEach((p, i)=>{
    const osc = audioCtx.createOscillator();
    osc.type='sine';
    osc.frequency.value = baseFreq*p;
    const g = audioCtx.createGain();
    g.gain.value = 1/(i+1);
    osc.connect(g);
    g.connect(master);
    osc.start(now);
    osc.stop(now+3.3);
  });
}

function scheduleBell(){
  if(soundMode !== 'chapel') return;
  if(bellTimer) clearTimeout(bellTimer);
  const delay = 45000 + Math.random()*45000;
  bellTimer = setTimeout(()=>{
    bellTimer = null;
    ringBell();
    scheduleBell();
  }, delay);
}

function playCandleSweep(reverse){
  if(soundMode !== 'chapel' || !audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type='sine';
  const g = audioCtx.createGain();
  g.gain.value=0.0001;
  osc.connect(g); g.connect(audioCtx.destination);
  const start = reverse?80:300;
  const end = reverse?300:80;
  osc.frequency.setValueAtTime(start, now);
  osc.frequency.exponentialRampToValueAtTime(end, now+0.4);
  g.gain.linearRampToValueAtTime(0.12, now+0.03);
  g.gain.exponentialRampToValueAtTime(0.0001, now+0.45);
  osc.start(now);
  osc.stop(now+0.5);
}

function playHolyChime(){
  if(soundMode !== 'chapel' || !audioCtx) return;
  const now = audioCtx.currentTime;
  [660, 880, 990].forEach((f,i)=>{
    const osc = audioCtx.createOscillator();
    osc.type='sine';
    osc.frequency.value=f;
    const g = audioCtx.createGain();
    g.gain.value=0.0001;
    osc.connect(g); g.connect(audioCtx.destination);
    const t = now + i*0.06;
    g.gain.linearRampToValueAtTime(0.05, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.6);
    osc.start(t);
    osc.stop(t+0.65);
  });
}

function playCameraSnap(){
  if(soundMode === 'muted') return;
  ensureAudioContext();
  const now = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.0001, now);
  master.gain.linearRampToValueAtTime(0.16, now+0.006);
  master.gain.exponentialRampToValueAtTime(0.0001, now+0.22);
  master.connect(audioCtx.destination);

  [850, 420].forEach((freq, i)=>{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const t = now + i*0.045;
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.linearRampToValueAtTime(0.45, t+0.004);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.055);
    osc.connect(gain);
    gain.connect(master);
    osc.start(t);
    osc.stop(t+0.07);
  });

  const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
  const noise = audioCtx.createBufferSource();
  const noiseGain = audioCtx.createGain();
  noise.buffer = noiseBuffer;
  noiseGain.gain.setValueAtTime(0.18, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.0001, now+0.08);
  noise.connect(noiseGain);
  noiseGain.connect(master);
  noise.start(now);
  noise.stop(now+0.09);
}

   ENTRY
   ========================================================= */
document.getElementById('entry').addEventListener('click', function(){
  this.style.display='none';
  document.getElementById('chapel').classList.remove('hidden');
  initAudio();
}, {once:true});
